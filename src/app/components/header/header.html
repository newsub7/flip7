<header class="app-header">
  <div class="brand">
    <span class="brand-mark" aria-hidden="true">7</span>
    <div class="brand-text">
      <h1>Flip 7</h1>
      <p>Punktezähler</p>
    </div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" title="Rundenverlauf" aria-label="Rundenverlauf anzeigen" (click)="history.emit()">
      <app-history-icon />
    </button>
    <button class="icon-btn" title="Spieler verwalten" aria-label="Spieler verwalten" (click)="players.emit()">
      <app-people-icon />
    </button>
    <button class="icon-btn" title="Einstellungen" aria-label="Einstellungen" (click)="settings.emit()">
      <app-gear-icon />
    </button>
    <button
      class="icon-btn"
      title="Design wechseln"
      [attr.aria-label]="themeService.theme() === 'dark' ? 'Helles Design aktivieren' : 'Dunkles Design aktivieren'"
      (click)="themeService.toggle()"
    >
      @if (themeService.theme() === 'dark') {
        <app-moon-icon />
      } @else {
        <app-sun-icon />
      }
    </button>
  </div>
</header>
