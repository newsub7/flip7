<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal round-modal">
    <div class="modal-header">
      <h2>{{ player().name }} – Runde {{ roundNumber() }}</h2>
      <button class="icon-btn" aria-label="Schließen" (click)="cancel.emit()">
        <app-close-icon />
      </button>
    </div>

    <button class="bust-btn" [class.active]="local().bust" (click)="toggleBust()">
      {{ local().bust ? 'Bust – 0 Punkte diese Runde' : 'Als Bust markieren (doppelte Zahl gezogen)' }}
    </button>

    @if (!local().bust) {
    <div style="margin-top: 16px">
      <div class="numbers-grid">
        @for (n of numbers(); track n) {
        <button class="chip" [class.selected]="local().cards.includes(n)" (click)="toggleNumber(n)">
          {{ n }}
        </button>
        }
      </div>
    </div>

    <div style="margin-top: 16px">
      <span class="field-label">Abzug-Karten (−)</span>
      <div class="chip-row">
        @for (m of modifiers(); track m) {
        <button class="chip" [class.selected]="this.local().modifiers.some(x => x.label === m.label)"
          (click)="toggleModifier(m)">
          {{ m.label }}
        </button>
        }
      </div>
    </div>

    <div class="round-total-preview" style="margin-top: 16px">
      <span class="value">{{ total() }}</span>
      <span class="label">
        {{ total() }} + {{ actualPoints() }} = {{ total() + actualPoints() }}
        <!-- Punkte diese Runde
        {{
        local().bonusChoice === 'steal' && local().bonus && brutalMode() ? ' (Bonus geht an Gegner)' : ''
        }} 
        test {{ actualPoints() }} -->
      </span>
    </div>
    }


    <div class="modal-footer">
      <button class="ghost-btn" (click)="cancel.emit()">Abbrechen</button>
      <button class="primary-btn" (click)="handleSave()">Speichern</button>
    </div>
  </div>
</div>
